<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUDGETER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; padding: 15px; 
            background: linear-gradient(#0a1f3d, #1a2f4f); 
            color: #f4e8c1; 
            min-height: 100vh;
        }
        .container { 
            max-width: 100%; margin: auto; background: #112233; 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); 
            border: 3px solid #ffd700; 
        }
        h1 { text-align: center; color: #ffd700; text-shadow: 3px 3px 0 #8b0000; font-size: 2.4em; margin: 10px 0 20px 0; }
        nav { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 16px; cursor: pointer; border: 2px solid #ffd700; border-radius: 8px; background: #8b0000; color: #ffd700; font-weight: bold; flex: 1; min-width: 140px; }
        button:hover { background: #ffd700; color: #8b0000; }
        .btn-success { background: #006400; }
        .btn-warning { background: #b8860b; }
        .btn-danger { background: #8b0000; }

        input, select { padding: 12px; margin: 8px 0; width: 100%; border-radius: 6px; border: 2px solid #ffd700; background: #1a2f4f; color: #f4e8c1; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #0f1f33; font-size: 0.95rem; }
        th, td { border: 1px solid #ffd700; padding: 10px; text-align: left; }
        th { background: #8b0000; color: #ffd700; }
        .split-yes { background: #003300; }
        .totals { display: grid; grid-template-columns: 1fr; gap: 15px; margin: 25px 0; }
        .card { background: #1a2f4f; padding: 18px; border-radius: 10px; border: 2px solid #ffd700; }
        .filters { margin: 20px 0; padding: 15px; background: #1a2f4f; border: 2px solid #ffd700; border-radius: 10px; }
        .status { text-align: center; margin: 10px 0; padding: 12px; border-radius: 6px; font-weight: bold; }
        @media (min-width: 768px) {
            .totals { grid-template-columns: repeat(3, 1fr); }
            button { flex: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BUDGETER</h1>

        <nav>
            <button onclick="showTab(0)">➕ Nuova Spesa</button>
            <button onclick="showTab(2)">📜 Lista Spese</button>
            <button onclick="showTab(3)">🏴‍☠️ Riepilogo</button>
            <button onclick="showTab(4)">📊 Grafici</button>
        </nav>

        <div id="status" class="status"></div>

        <!-- TAB 0: Nuova Spesa -->
        <div id="tab0" class="tab">
            <h2 id="formTitle">➕ Nuova Spesa</h2>
            <input type="hidden" id="editId">
            
            <input type="text" id="desc" placeholder="Descrizione della spesa">
            <select id="category">
                <option value="">Categoria</option>
                <option value="Benzina">⛽ Benzina / Diesel</option>
                <option value="Alimentari">🍖 Alimentari</option>
                <option value="Campeggio">⛺ Campeggio</option>
                <option value="Ristoranti">🍺 Ristoranti</option>
                <option value="Pedaggi">🛣️ Pedaggi</option>
                <option value="Attrazioni">🏰 Attrazioni</option>
                <option value="Manutenzione">🔧 Manutenzione</option>
                <option value="Varie">🪙 Varie</option>
            </select>
            
            <input type="number" id="amount" placeholder="Importo €" step="0.01">
            <select id="payer">
                <option value="Livio">Livio (Barella)</option>
                <option value="Irene">Irene (Barella)</option>
                <option value="Lisa">Lisa (Sforzelli)</option>
                <option value="Valerio">Valerio (Sforzelli)</option>
            </select>
            <input type="date" id="expenseDate">
            
            <label><input type="checkbox" id="split"> SPLIT</label><br><br>
            
            <button onclick="saveExpense()" class="btn-success" id="saveBtn">💾 Salva Spesa</button>
            <button onclick="cancelEdit()" class="btn-danger" id="cancelBtn" style="display:none;">Annulla Modifica</button>
        </div>

        <!-- TAB 2: Lista Spese -->
        <div id="tab2" class="tab" style="display:none;">
            <h2>📜 Lista Spese</h2>
            <input type="text" id="search" placeholder="Cerca spesa..." onkeyup="filterExpenses()">
            <table id="expensesTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Descrizione</th>
                        <th>Importo</th>
                        <th>Chi ha pagato</th>
                        <th>SPLIT</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- TAB 3: Riepilogo -->
        <div id="tab3" class="tab" style="display:none;">
            <h2>🏴‍☠️ Riepilogo Famiglie</h2>
            <div class="totals" id="familyTotals"></div>
        </div>

        <!-- TAB 4: Grafici -->
        <div id="tab4" class="tab" style="display:none;">
            <h2>📊 Grafici</h2>
            <div class="filters">
                <select id="chartCategoryFilter" onchange="updateCharts()">
                    <option value="Tutti">Tutte le categorie</option>
                    <option value="Benzina">⛽ Benzina</option>
                    <option value="Alimentari">🍖 Alimentari</option>
                    <option value="Campeggio">⛺ Campeggio</option>
                    <option value="Ristoranti">🍺 Ristoranti</option>
                    <option value="Pedaggi">🛣️ Pedaggi</option>
                    <option value="Attrazioni">🏰 Attrazioni</option>
                    <option value="Manutenzione">🔧 Manutenzione</option>
                    <option value="Varie">🪙 Varie</option>
                </select>
                <select id="chartPeriodFilter" onchange="toggleDateRange()">
                    <option value="all">Tutto il viaggio</option>
                    <option value="7">Ultimi 7 giorni</option>
                    <option value="custom">Periodo personalizzato</option>
                </select>
                <div id="dateRange" style="display:none; margin-top:10px;">
                    <input type="date" id="fromDate" onchange="updateCharts()"> 
                    <span style="color:#ffd700;">→</span> 
                    <input type="date" id="toDate" onchange="updateCharts()">
                </div>
            </div>
            <canvas id="pieChart" height="180"></canvas>
            <canvas id="barChart" height="220"></canvas>
        </div>
    </div>

    <script>
        // ==================== TUA CONFIGURAZIONE FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDIMfn30rD3EHlrQFQx6Yko_Vrimx-jAws",
            authDomain: "budgeter-75f51.firebaseapp.com",
            databaseURL: "https://budgeter-75f51-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "budgeter-75f51",
            storageBucket: "budgeter-75f51.firebasestorage.app",
            messagingSenderId: "1089429460683",
            appId: "1:1089429460683:web:709f3443e46441e9b8ed4e"
        };

        firebase.initializeApp(firebaseConfig);
        const expensesRef = firebase.database().ref('expenses');

        let expenses = [];
        let currentChartPie, currentChartBar;
        let editingId = null;

        const users = [
            { name: "Livio", family: "Barella" },
            { name: "Irene", family: "Barella" },
            { name: "Lisa", family: "Sforzelli" },
            { name: "Valerio", family: "Sforzelli" }
        ];

        function showStatus(msg, color = "green") {
            const el = document.getElementById('status');
            el.style.color = color === "red" ? "#ff6666" : "#66ff99";
            el.textContent = msg;
            setTimeout(() => el.textContent = "", 5000);
        }

        function saveExpense() {
            const desc = document.getElementById('desc').value.trim();
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payer = document.getElementById('payer').value;
            const dateStr = document.getElementById('expenseDate').value;
            const split = document.getElementById('split').checked;

            if (!desc || !category || isNaN(amount) || !payer || !dateStr) {
                return alert("❌ Compila tutti i campi obbligatori");
            }

            const expenseData = {
                date: dateStr + "T12:00:00",
                description: desc,
                category: category,
                amount: amount,
                payer: payer,
                split: split
            };

            if (editingId) {
                expensesRef.child(editingId).update(expenseData)
                    .then(() => {
                        showStatus("✅ Spesa modificata con successo!");
                        cancelEdit();
                    })
                    .catch(err => showStatus("❌ Errore modifica: " + err.message, "red"));
            } else {
                expensesRef.push(expenseData)
                    .then(() => {
                        showStatus("✅ Spesa salvata correttamente!");
                        cancelEdit();
                    })
                    .catch(err => showStatus("❌ Errore salvataggio: " + err.message, "red"));
            }
        }

        function loadExpenses() {
            expensesRef.on('value', (snapshot) => {
                expenses = [];
                const tbody = document.querySelector('#expensesTable tbody');
                tbody.innerHTML = '';

                snapshot.forEach((child) => {
                    const exp = child.val();
                    exp.id = child.key;
                    expenses.push(exp);

                    const row = document.createElement('tr');
                    if (exp.split) row.classList.add('split-yes');
                    
                    row.innerHTML = `
                        <td>${new Date(exp.date).toLocaleDateString('it-IT')}</td>
                        <td><strong>${exp.category}</strong></td>
                        <td>${exp.description}</td>
                        <td>€ ${exp.amount.toFixed(2)}</td>
                        <td>${exp.payer}</td>
                        <td>${exp.split ? '✅ Sì' : '❌ No'}</td>
                        <td>
                            <button onclick="editExpense('${exp.id}')" class="btn-warning">Modifica</button>
                            <button onclick="deleteExpense('${exp.id}')" class="btn-danger">Elimina</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                updateAll();
            });
        }

        function editExpense(id) {
            const exp = expenses.find(e => e.id === id);
            if (!exp) return;
            editingId = id;
            document.getElementById('formTitle').textContent = "Modifica Spesa";
            document.getElementById('desc').value = exp.description;
            document.getElementById('category').value = exp.category;
            document.getElementById('amount').value = exp.amount;
            document.getElementById('payer').value = exp.payer;
            document.getElementById('split').checked = exp.split;
            document.getElementById('expenseDate').value = new Date(exp.date).toISOString().split('T')[0];

            document.getElementById('saveBtn').textContent = "Salva Modifiche";
            document.getElementById('cancelBtn').style.display = 'inline-block';
            showTab(0);
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('formTitle').textContent = "➕ Nuova Spesa";
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('category').value = '';
            document.getElementById('split').checked = false;
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('saveBtn').textContent = "💾 Salva Spesa";
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function deleteExpense(id) {
            if (confirm("Eliminare questa spesa?")) {
                expensesRef.child(id).remove()
                    .then(() => showStatus("Spesa eliminata"))
                    .catch(() => showStatus("Errore eliminazione", "red"));
            }
        }

        // ==================== Funzioni Grafici e Filtri (invariate) ====================
        function getFilteredExpenses() {
            const catFilter = document.getElementById('chartCategoryFilter').value;
            const period = document.getElementById('chartPeriodFilter').value;
            let filtered = expenses;

            if (catFilter !== "Tutti") filtered = filtered.filter(e => e.category === catFilter);

            if (period === "7") {
                const limit = Date.now() - 7*24*60*60*1000;
                filtered = filtered.filter(e => new Date(e.date) >= limit);
            } else if (period === "custom") {
                const from = document.getElementById('fromDate').value;
                const to = document.getElementById('toDate').value;
                if (from) filtered = filtered.filter(e => new Date(e.date) >= new Date(from));
                if (to) {
                    const end = new Date(to); end.setHours(23,59,59);
                    filtered = filtered.filter(e => new Date(e.date) <= end);
                }
            }
            return filtered;
        }

        function calculateFamilyTotals(filtered) {
            let barella = 0, sforzelli = 0, shared = 0;
            filtered.forEach(exp => {
                const user = users.find(u => u.name === exp.payer);
                if (!user) return;
                if (exp.split) shared += exp.amount;
                else if (user.family === "Barella") barella += exp.amount;
                else sforzelli += exp.amount;
            });
            const sharedEach = shared / 2;
            return {
                barellaShouldPay: barella + sharedEach,
                sforzelliShouldPay: sforzelli + sharedEach,
                sharedTotal: shared
            };
        }

        function updateCharts() {
            const filtered = getFilteredExpenses();
            const totals = calculateFamilyTotals(filtered);

            if (currentChartPie) currentChartPie.destroy();
            if (currentChartBar) currentChartBar.destroy();

            currentChartPie = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: { labels: ['Barella', 'Sforzelli'], datasets: [{ data: [totals.barellaShouldPay, totals.sforzelliShouldPay], backgroundColor: ['#3498db', '#e74c3c'] }] }
            });

            currentChartBar = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: ['Barella', 'Sforzelli', 'Condivise'],
                    datasets: [{ label: 'Importo €', data: [totals.barellaShouldPay, totals.sforzelliShouldPay, totals.sharedTotal], backgroundColor: ['#3498db', '#e74c3c', '#ffd700'] }]
                }
            });
        }

        function updateAll() { updateCharts(); }
        function toggleDateRange() {
            const isCustom = document.getElementById('chartPeriodFilter').value === "custom";
            document.getElementById('dateRange').style.display = isCustom ? "block" : "none";
            updateCharts();
        }
        function filterExpenses() {
            const term = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#expensesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }
        function showTab(n) {
            document.querySelectorAll('.tab').forEach(tab => tab.style.display = 'none');
            document.getElementById(`tab${n}`).style.display = 'block';
            if (n === 3 || n === 4) updateAll();
        }

        // INIT
        window.onload = () => {
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('fromDate').value = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
            document.getElementById('toDate').value = new Date().toISOString().split('T')[0];
            
            loadExpenses();
            showTab(0);
        };
    </script>
</body>
</html>
