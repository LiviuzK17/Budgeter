<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠️BUDGETER☠️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; padding: 15px; 
            background: linear-gradient(#0a1f3d, #1a2f4f); 
            color: #f4e8c1; 
            min-height: 100vh;
        }
        .container { 
            max-width: 100%; margin: auto; background: #112233; 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); 
            border: 3px solid #ffd700; 
        }
        h1 { text-align: center; color: #ffd700; text-shadow: 3px 3px 0 #8b0000; font-size: 2.4em; margin: 10px 0 20px 0; }
        nav { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 16px; cursor: pointer; border: 2px solid #ffd700; border-radius: 8px; background: #8b0000; color: #ffd700; font-weight: bold; flex: 1; min-width: 140px; }
        button:hover { background: #ffd700; color: #8b0000; }
        .btn-success { background: #006400; }

        input, select { padding: 12px; margin: 8px 0; width: 100%; border-radius: 6px; border: 2px solid #ffd700; background: #1a2f4f; color: #f4e8c1; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #0f1f33; font-size: 0.95rem; }
        th, td { border: 1px solid #ffd700; padding: 10px; text-align: left; }
        th { background: #8b0000; color: #ffd700; cursor: pointer; user-select: none; position: relative; }
        th:hover { background: #a52a2a; }
        th .sort-indicator { margin-left: 5px; font-size: 0.9em; }
        .split-yes { background: #003300; }
        .totals { display: grid; grid-template-columns: 1fr; gap: 15px; margin: 25px 0; }
        .card { background: #1a2f4f; padding: 18px; border-radius: 10px; border: 2px solid #ffd700; }
        .status { text-align: center; margin: 10px 0; padding: 12px; border-radius: 6px; font-weight: bold; }
        .action-btn { 
            padding: 6px 8px; 
            margin: 2px; 
            font-size: 1.2em; 
            background: none; 
            border: none; 
            cursor: pointer; 
        }
        .actions { white-space: nowrap; }
        .center-split { text-align: center; margin: 15px 0; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☠️BUDGETER☠️</h1>

        <nav>
            <button onclick="showTab(0)">➕ Nuova Spesa</button>
            <button onclick="showTab(2)">📜 Lista Spese</button>
            <button onclick="showTab(3)">🏴‍☠️ Riepilogo</button>
        </nav>

        <div id="status" class="status"></div>

        <!-- TAB 0 -->
        <div id="tab0" class="tab">
            <h2 id="formTitle">➕ Nuova Spesa</h2>
            <input type="hidden" id="editId">
            
            <input type="text" id="desc" placeholder="Descrizione della spesa">
            <select id="category">
                <option value="">Categoria</option>
                <option value="Benzina">⛽ Benzina / Diesel</option>
                <option value="Alimentari">🍖 Alimentari</option>
                <option value="Campeggio">⛺ Campeggio</option>
                <option value="Ristoranti">🍺 Ristoranti</option>
                <option value="Pedaggi">🛣️ Pedaggi</option>
                <option value="Attrazioni">🏰 Attrazioni</option>
                <option value="Manutenzione">🔧 Manutenzione</option>
                <option value="Varie">🪙 Varie</option>
            </select>
            
            <input type="number" id="amount" placeholder="Importo €" step="0.01">
            <select id="payer">
                <option value="Livio">Livio (Barella)</option>
                <option value="Irene">Irene (Barella)</option>
                <option value="Lisa">Lisa (Sforzelli)</option>
                <option value="Valerio">Valerio (Sforzelli)</option>
            </select>
            <input type="date" id="expenseDate">
            
            <div class="center-split">
                <label><input type="checkbox" id="split"> <strong>SPLIT</strong></label>
            </div>
            
            <button onclick="saveExpense()" class="btn-success" id="saveBtn">💾 Salva Spesa</button>
            <button onclick="cancelEdit()" class="btn-danger" id="cancelBtn" style="display:none;">Annulla Modifica</button>
        </div>

        <!-- TAB 2: Lista Spese -->
        <div id="tab2" class="tab" style="display:none;">
            <h2>📜 Lista Spese</h2>
            <input type="text" id="search" placeholder="Cerca..." onkeyup="applyFilters()">
            <table id="expensesTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Data <span class="sort-indicator" id="sort0"></span></th>
                        <th onclick="filterByCategory()">Categoria</th>
                        <th onclick="sortTable(2)">Descrizione</th>
                        <th onclick="sortTable(3)">Importo <span class="sort-indicator" id="sort3"></span></th>
                        <th>Spesi da</th>
                        <th onclick="toggleSplitFilter()">SPLIT</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- TAB 3: Riepilogo -->
        <div id="tab3" class="tab" style="display:none;">
            <h2>🏴‍☠️ Riepilogo Famiglie</h2>
            <div class="totals" id="familyTotals"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIMfn30rD3EHlrQFQx6Yko_Vrimx-jAws",
            authDomain: "budgeter-75f51.firebaseapp.com",
            databaseURL: "https://budgeter-75f51-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "budgeter-75f51",
            storageBucket: "budgeter-75f51.firebasestorage.app",
            messagingSenderId: "1089429460683",
            appId: "1:1089429460683:web:709f3443e46441e9b8ed4e"
        };

        firebase.initializeApp(firebaseConfig);
        const expensesRef = firebase.database().ref('expenses');

        let expenses = [];
        let editingId = null;
        let sortColumn = -1;
        let sortAsc = true;
        let categoryFilter = null;
        let splitFilter = null;

        const users = [
            { name: "Livio", family: "Barella" },
            { name: "Irene", family: "Barella" },
            { name: "Lisa", family: "Sforzelli" },
            { name: "Valerio", family: "Sforzelli" }
        ];

        function showStatus(msg, color = "green") {
            const el = document.getElementById('status');
            el.style.color = color === "red" ? "#ff6666" : "#66ff99";
            el.textContent = msg;
            setTimeout(() => el.textContent = "", 5000);
        }

        function saveExpense() {
            const desc = document.getElementById('desc').value.trim();
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payer = document.getElementById('payer').value;
            const dateStr = document.getElementById('expenseDate').value;
            const split = document.getElementById('split').checked;

            if (!desc || !category || isNaN(amount) || !payer || !dateStr) {
                return alert("❌ Compila tutti i campi obbligatori");
            }

            const expenseData = { date: dateStr + "T12:00:00", description: desc, category, amount, payer, split };

            if (editingId) {
                expensesRef.child(editingId).update(expenseData).then(() => { showStatus("✅ Modificata!"); cancelEdit(); });
            } else {
                expensesRef.push(expenseData).then(() => { showStatus("✅ Spesa salvata!"); cancelEdit(); });
            }
        }

        function loadExpenses() {
            expensesRef.on('value', (snapshot) => {
                expenses = [];
                snapshot.forEach((child) => {
                    const exp = child.val();
                    exp.id = child.key;
                    expenses.push(exp);
                });
                renderTable();
            });
        }

        function renderTable() {
            const tbody = document.querySelector('#expensesTable tbody');
            tbody.innerHTML = '';

            let filtered = expenses.filter(exp => {
                if (categoryFilter && exp.category !== categoryFilter) return false;
                if (splitFilter !== null && exp.split !== splitFilter) return false;
                return true;
            });

            // Ordinamento
            if (sortColumn !== -1) {
                filtered.sort((a, b) => {
                    let valA, valB;
                    if (sortColumn === 0) { // Data
                        valA = new Date(a.date);
                        valB = new Date(b.date);
                    } else if (sortColumn === 3) { // Importo
                        valA = a.amount;
                        valB = b.amount;
                    }
                    return sortAsc ? (valA - valB) : (valB - valA);
                });
            }

            filtered.forEach(exp => {
                const row = document.createElement('tr');
                if (exp.split) row.classList.add('split-yes');
                row.innerHTML = `
                    <td>${new Date(exp.date).toLocaleDateString('it-IT')}</td>
                    <td><strong>${exp.category}</strong></td>
                    <td>${exp.description}</td>
                    <td>€ ${exp.amount.toFixed(2)}</td>
                    <td>${exp.payer}</td>
                    <td>${exp.split ? '✅ Sì' : '❌ No'}</td>
                    <td class="actions">
                        <button onclick="editExpense('${exp.id}')" class="action-btn" title="Modifica">✏️</button>
                        <button onclick="deleteExpense('${exp.id}')" class="action-btn" title="Elimina">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function sortTable(col) {
            if (sortColumn === col) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = col;
                sortAsc = true;
            }

            // Aggiorna indicatori
            document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');
            const indicator = document.getElementById(`sort${col}`);
            if (indicator) indicator.textContent = sortAsc ? '↑' : '↓';

            renderTable();
        }

        function filterByCategory() {
            const cats = [...new Set(expenses.map(e => e.category))];
            let text = "Seleziona categoria:\n0 → Tutte\n";
            cats.forEach((c, i) => text += `${i+1} → ${c}\n`);
            
            const input = prompt(text);
            if (input === null) return;
            
            categoryFilter = (input === "0") ? null : cats[parseInt(input)-1];
            renderTable();
        }

        function toggleSplitFilter() {
            if (splitFilter === null) splitFilter = true;
            else if (splitFilter === true) splitFilter = false;
            else splitFilter = null;
            renderTable();
        }

        function applyFilters() {
            renderTable();
        }

        function editExpense(id) {
            const exp = expenses.find(e => e.id === id);
            if (!exp) return;
            editingId = id;
            document.getElementById('formTitle').textContent = "Modifica Spesa";
            document.getElementById('desc').value = exp.description;
            document.getElementById('category').value = exp.category;
            document.getElementById('amount').value = exp.amount;
            document.getElementById('payer').value = exp.payer;
            document.getElementById('split').checked = exp.split;
            document.getElementById('expenseDate').value = new Date(exp.date).toISOString().split('T')[0];

            document.getElementById('saveBtn').textContent = "Salva Modifiche";
            document.getElementById('cancelBtn').style.display = 'inline-block';
            showTab(0);
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('formTitle').textContent = "➕ Nuova Spesa";
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('category').value = '';
            document.getElementById('split').checked = false;
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('saveBtn').textContent = "💾 Salva Spesa";
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function deleteExpense(id) {
            if (confirm("Eliminare questa spesa?")) {
                expensesRef.child(id).remove().then(() => showStatus("✅ Spesa eliminata"));
            }
        }

        function updateSummary() {
            let barellaDirect = 0, sforzelliDirect = 0, shared = 0;
            expenses.forEach(exp => {
                const user = users.find(u => u.name === exp.payer);
                if (!user) return;
                if (exp.split) shared += exp.amount;
                else if (user.family === "Barella") barellaDirect += exp.amount;
                else sforzelliDirect += exp.amount;
            });
            const sharedEach = shared / 2;
            document.getElementById('familyTotals').innerHTML = `
                <div class="card"><h3>Barella</h3><p>Spese personali: € ${barellaDirect.toFixed(2)}</p><p>Quota condivise: € ${sharedEach.toFixed(2)}</p><p><strong>Totale: € ${(barellaDirect + sharedEach).toFixed(2)}</strong></p></div>
                <div class="card"><h3>Sforzelli</h3><p>Spese personali: € ${sforzelliDirect.toFixed(2)}</p><p>Quota condivise: € ${sharedEach.toFixed(2)}</p><p><strong>Totale: € ${(sforzelliDirect + sharedEach).toFixed(2)}</strong></p></div>
                <div class="card"><h3>Totale Viaggio</h3><p><strong>€ ${(barellaDirect + sforzelliDirect + shared).toFixed(2)}</strong></p></div>
            `;
        }

        function showTab(n) {
            document.querySelectorAll('.tab').forEach(tab => tab.style.display = 'none');
            document.getElementById(`tab${n}`).style.display = 'block';
            if (n === 3) updateSummary();
            if (n === 2) renderTable();
        }

        window.onload = () => {
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            loadExpenses();
            showTab(0);
        };
    </script>
</body>
</html>
