<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeter</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --gold: #D4AF37;
            --dark: #2C1F1F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.85)), 
                        url('https://thumbs.dreamstime.com/b/dark-ship-deck-12737641.jpg') center/cover fixed;
            color: #fff;
            min-height: 100vh;
            padding: 8px;
            font-size: 14px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(44, 31, 31, 0.95);
            border: 6px solid var(--gold);
            border-radius: 12px;
            overflow: hidden;
        }

        header {
            background: linear-gradient(#3C2F2F, #2C1F1F);
            padding: 18px 12px;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        h1 { 
            font-size: 2.4rem; 
            color: var(--gold); 
            text-shadow: 3px 3px 0 #000; 
        }

        .main { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding: 12px; 
        }

        .sidebar, .content {
            background: rgba(60, 47, 47, 0.85);
            padding: 15px;
            border: 3px solid var(--gold);
            border-radius: 8px;
        }

        input, select, button {
            font-family: inherit;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid var(--gold);
            background: #fff;
            color: #000;
            width: 100%;
            border-radius: 4px;
        }

        button {
            background: var(--gold);
            color: #000;
            cursor: pointer;
            font-weight: bold;
            padding: 14px;
        }

        button:hover { background: #b8860b; }

        .expense-item {
            background: rgba(245, 232, 199, 0.92);
            color: #222;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #3C2F2F;
            position: relative;
        }

        .expense-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .expense-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 0.85rem;
            flex: 1;
        }

        .btn-edit { background: #4CAF50; color: white; }
        .btn-delete { background: #c00; color: white; }

        .total {
            font-size: 1.35rem;
            color: var(--gold);
            text-align: center;
            margin: 12px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-bar select, .filter-bar button {
            flex: 1;
            min-width: 140px;
        }

        @media (min-width: 768px) {
            .main {
                flex-direction: row;
            }
            .sidebar { 
                max-width: 380px; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>BUDGETER</h1>
            <p>Spese Familiari • Barella & Sforzelli</p>
        </header>

        <div class="main">
            <!-- Sidebar Nuova Spesa -->
            <div class="sidebar">
                <h2 style="color:var(--gold); margin-bottom:12px;">➕ Nuova Spesa</h2>
                
                <input type="date" id="date">
                <input type="text" id="description" placeholder="Descrizione spesa">
                <input type="number" id="amount" placeholder="Importo €" step="0.01">
                
                <select id="person">
                    <option value="Livio">Livio</option>
                    <option value="Irene">Irene</option>
                    <option value="Vale">Vale</option>
                    <option value="Lisa">Lisa</option>
                </select>

                <label style="color:#ddd; display:block; margin:10px 0 8px;">
                    <input type="checkbox" id="toSplit"> DA DIVIDERE tra le due famiglie
                </label>

                <button onclick="addExpense()">Aggiungi Spesa</button>
            </div>

            <!-- Lista Spese -->
            <div class="content">
                <div class="total" id="total-all">Totale: 0.00 €</div>
                
                <div style="display:flex; justify-content:space-around; margin:12px 0; font-size:0.95rem;">
                    <div>Barella: <span id="barella-total" style="color:#4CAF50;">0.00 €</span></div>
                    <div>Sforzelli: <span id="sforzelli-total" style="color:#4CAF50;">0.00 €</span></div>
                </div>

                <div class="filter-bar">
                    <select id="filter-person" onchange="renderExpenses()">
                        <option value="">Tutti</option>
                        <option value="Livio">Livio</option>
                        <option value="Irene">Irene</option>
                        <option value="Vale">Vale</option>
                        <option value="Lisa">Lisa</option>
                    </select>
                    <select id="filter-split" onchange="renderExpenses()">
                        <option value="">Tutte</option>
                        <option value="split">Da Dividere</option>
                        <option value="nosplit">Personali</option>
                    </select>
                    <button onclick="clearFilters()">Reset</button>
                </div>

                <div id="expenses-list"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDIMfn30rD3EHlrQFQx6Yko_Vrimx-jAws",
            authDomain: "budgeter-75f51.firebaseapp.com",
            projectId: "budgeter-75f51",
            storageBucket: "budgeter-75f51.firebasestorage.app",
            messagingSenderId: "1089429460683",
            appId: "1:1089429460683:web:709f3443e46441e9b8ed4e"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const expensesRef = db.ref('expenses');

        let expenses = [];
        const familyMap = { "Livio": "Barella", "Irene": "Barella", "Vale": "Sforzelli", "Lisa": "Sforzelli" };

        expensesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            expenses = data ? Object.values(data) : [];
            expenses.sort((a,b) => b.date.localeCompare(a.date));
            renderAll();
        });

        function saveExpenses() {
            const obj = {};
            expenses.forEach(exp => obj[exp.id] = exp);
            expensesRef.set(obj);
        }

        function addExpense() {
            const description = document.getElementById('description').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const person = document.getElementById('person').value;
            const date = document.getElementById('date').value;
            const toSplit = document.getElementById('toSplit').checked;

            if (!description || !amount || !date) return alert("Compila tutti i campi!");

            const newExpense = {
                id: Date.now().toString(),
                date, description, amount, person, toSplit
            };

            expenses.unshift(newExpense);
            saveExpenses();

            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('toSplit').checked = false;
        }

        function renderAll() {
            renderExpenses();
            renderTotals();
        }

        function renderTotals() {
            let total = 0, barella = 0, sforzelli = 0;

            expenses.forEach(exp => {
                total += exp.amount;
                if (exp.toSplit) {
                    const half = exp.amount / 2;
                    barella += half;
                    sforzelli += half;
                } else {
                    familyMap[exp.person] === "Barella" ? barella += exp.amount : sforzelli += exp.amount;
                }
            });

            document.getElementById('total-all').textContent = `Totale: ${total.toFixed(2)} €`;
            document.getElementById('barella-total').textContent = `${barella.toFixed(2)} €`;
            document.getElementById('sforzelli-total').textContent = `${sforzelli.toFixed(2)} €`;
        }

        function renderExpenses() {
            const container = document.getElementById('expenses-list');
            const personFilter = document.getElementById('filter-person').value;
            const splitFilter = document.getElementById('filter-split').value;

            let filtered = expenses;

            if (personFilter) filtered = filtered.filter(e => e.person === personFilter);
            if (splitFilter === "split") filtered = filtered.filter(e => e.toSplit);
            if (splitFilter === "nosplit") filtered = filtered.filter(e => !e.toSplit);

            container.innerHTML = filtered.map(exp => `
                <div class="expense-item">
                    <div class="expense-header">
                        <div>
                            <strong>${exp.date} • ${exp.person}</strong><br>
                            ${exp.description}
                        </div>
                        <div style="text-align:right;">
                            <strong>${exp.amount.toFixed(2)} €</strong>
                        </div>
                    </div>
                    ${exp.toSplit ? '<span style="color:#c00; font-size:0.9rem;">[DA DIVIDERE]</span>' : ''}
                    
                    <div class="expense-actions">
                        <button class="btn-small btn-edit" onclick="editExpense('${exp.id}')">✏️ Modifica</button>
                        <button class="btn-small btn-delete" onclick="deleteExpense('${exp.id}')">🗑 Elimina</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteExpense(id) {
            if (confirm("Eliminare definitivamente questa spesa?")) {
                expenses = expenses.filter(exp => exp.id !== id);
                saveExpenses();
            }
        }

        function editExpense(id) {
            const exp = expenses.find(e => e.id === id);
            if (!exp) return;

            document.getElementById('date').value = exp.date;
            document.getElementById('description').value = exp.description;
            document.getElementById('amount').value = exp.amount;
            document.getElementById('person').value = exp.person;
            document.getElementById('toSplit').checked = exp.toSplit;

            alert("Modifica i dati nei campi in alto e premi 'Aggiungi Spesa' per salvare.");
        }

        function clearFilters() {
            document.getElementById('filter-person').value = '';
            document.getElementById('filter-split').value = '';
            renderExpenses();
        }

        document.getElementById('date').valueAsDate = new Date();

        window.onload = () => renderAll();
    </script>
</body>
</html>
